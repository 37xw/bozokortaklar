<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>Bozok Ortaklar — Bioderma Fiyat Karşılaştırma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--bg2:#0a0a0a;--bg3:#141414;--bg4:#1e1e1e;
  --fg:#ffffff;--fg2:#a3a3a3;--fg3:#525252;
  --accent:#dc2626;--accent2:#b91c1c;
  --green:#22c55e;--orange:#f59e0b;
  --card:#0f0f0f;--border:#1a1a1a;
  --font:'Inter',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg:#f8f8f8;--bg2:#ffffff;--bg3:#f0f0f0;--bg4:#e5e5e5;
  --fg:#0a0a0a;--fg2:#666;--fg3:#999;
  --accent:#dc2626;--accent2:#b91c1c;
  --card:#fff;--border:#e5e5e5;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.5;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
a{text-decoration:none;color:inherit}
::selection{background:var(--accent);color:#fff}
*{-webkit-tap-highlight-color:transparent}

.header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:24px}
.logo{font-size:20px;font-weight:800;letter-spacing:-.3px;cursor:pointer;white-space:nowrap}
.logo .r{color:var(--accent)}
.logo .w{color:var(--fg)}
.search-box{flex:1;max-width:520px;position:relative}
.search-box input{width:100%;padding:12px 48px 12px 16px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;font-family:var(--font);background:var(--bg3);color:var(--fg);transition:border-color .2s}
.search-box input::placeholder{color:var(--fg3)}
.search-box input:focus{border-color:var(--accent)}
.search-box button{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:40px;height:40px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-box button:hover{background:var(--accent2)}
.theme-toggle{width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--fg2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.theme-toggle:hover{color:var(--fg)}

.hero{padding:48px 24px 32px;text-align:center}
.hero h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;color:var(--fg);text-shadow:0 4px 20px rgba(220,38,38,.4)}
.hero p{font-size:13px;color:var(--fg2)}
.hero .stats{display:flex;justify-content:center;gap:40px;margin-top:20px}
.hero .stat{text-align:center}
.hero .stat b{font-size:22px;font-weight:800;display:block}
.hero .stat span{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;font-weight:500}

.content{max-width:1200px;margin:0 auto;padding:0 24px 60px}

.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.filter-label{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg3);border:1px solid var(--border);color:var(--fg2);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.chip:hover{color:var(--fg);border-color:var(--fg3)}
.chip.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.chip .cnt{opacity:.5;font-size:10px;margin-left:2px}
.chip.active .cnt{opacity:.7}

.sbtn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;background:var(--bg3);border:1px solid var(--border);color:var(--fg2);cursor:pointer;transition:all .15s}
.sbtn:hover{color:var(--fg);border-color:var(--fg3)}
.sbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.result-info{font-size:12px;color:var(--fg3);margin:16px 0 12px}
.result-info b{color:var(--fg2)}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.product-card{background:var(--card);padding:20px;cursor:pointer;transition:background .15s;position:relative;-webkit-user-select:none;user-select:none}
.product-card:hover{background:var(--bg3)}
.product-card:active{background:var(--bg4)}

.pc-top{display:flex;gap:16px;align-items:flex-start}
.pc-img{width:80px;height:80px;object-fit:contain;border-radius:8px;background:var(--bg3);border:1px solid var(--border);padding:4px;flex-shrink:0}
.pc-img-ph{width:80px;height:80px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.pc-img-ph .ph-brand{font-size:9px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.pc-img-ph .ph-sub{font-size:5px;color:var(--fg3)}
.pc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.pc-series{font-size:10px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px}
.pc-name{font-size:13px;font-weight:500;color:var(--fg);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-best-price{font-size:20px;font-weight:800;color:var(--accent);margin-top:4px}
.pc-best-price .tl{font-size:11px;font-weight:500;opacity:.6}
.pc-meta{font-size:11px;color:var(--fg3)}
.pc-meta b{color:var(--fg2)}

.pc-badge{position:absolute;font-weight:700;border-radius:4px;letter-spacing:.2px}
.pc-badge.hot{background:var(--orange);color:#000;font-size:10px;padding:3px 8px;top:12px;right:12px}
.pc-badge.sites-badge{background:var(--bg3);border:1px solid var(--border);color:var(--fg2);font-size:10px;padding:3px 8px;top:12px;right:12px}
.pc-badge.firsat{position:relative;background:var(--accent);color:#fff;font-size:14px;font-weight:800;padding:8px 16px;border-radius:0 0 8px 8px;text-align:center;width:100%;box-shadow:0 4px 12px rgba(220,38,38,.5);letter-spacing:.3px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;padding:20px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);opacity:0;pointer-events:none;transition:opacity .2s;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px;max-height:min(85vh,calc(100vh - 40px));overflow-y:auto;transform:translateY(16px);transition:transform .2s;-webkit-overflow-scrolling:touch}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{display:flex;gap:16px;padding:20px;border-bottom:1px solid var(--border);position:relative}
.modal-img{width:72px;height:72px;object-fit:contain;border-radius:8px;background:var(--bg3);border:1px solid var(--border);padding:4px;flex-shrink:0}
.modal-info{flex:1;min-width:0}
.modal-series{font-size:10px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.modal-name{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:4px}
.modal-price{font-size:22px;font-weight:800;color:var(--accent)}
.modal-price .tl{font-size:11px;font-weight:500;opacity:.6}
.modal-close{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--fg2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-body{padding:16px 20px 20px}
.modal-body-title{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.modal-site-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;font-size:12px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px}
.modal-site-row:hover{background:var(--bg4)}
.modal-site-row.best{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}
.modal-site-name{font-weight:500;color:var(--fg);flex:1;display:flex;align-items:center;gap:8px}
.modal-site-name .site-icon{padding:2px 6px;border-radius:4px;background:var(--bg4);border:1px solid var(--border);font-size:8px;font-weight:700;color:var(--fg3);letter-spacing:.3px}
.modal-site-row.best .modal-site-name .site-icon{background:var(--green);color:#fff;border-color:var(--green)}
.modal-site-price{font-weight:700;color:var(--fg2);margin:0 12px;white-space:nowrap;font-size:13px}
.modal-site-row.best .modal-site-price{color:var(--green);font-size:15px}
.modal-site-btn{padding:5px 14px;background:var(--bg4);color:var(--fg2);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;text-decoration:none;transition:all .15s}
.modal-site-btn:hover{background:var(--fg);color:var(--bg)}
.modal-site-btn.best-btn{background:var(--green);color:#fff;border-color:var(--green)}.modal-site-btn.best-btn:hover{background:#16a34a}
.modal-saving{text-align:center;padding:14px 20px 0;font-size:11px;color:var(--fg3);border-top:1px solid var(--border);margin-top:8px}
.modal-saving b{color:var(--green)}

.pagination{display:flex;justify-content:center;gap:4px;margin:32px 0;flex-wrap:wrap}
.page-btn{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--border);color:var(--fg2);cursor:pointer;transition:all .15s}
.page-btn:hover{color:var(--fg);border-color:var(--fg3)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.25;cursor:not-allowed}

.footer{border-top:1px solid var(--border);text-align:center;padding:32px 24px;font-size:11px;color:var(--fg3)}
.footer b{color:var(--fg2)}

@media(max-width:768px){
  .header-inner{gap:10px}
  .hero{padding:32px 16px 24px}
  .hero h1{font-size:20px}
  .hero .stats{gap:20px}
  .hero .stat b{font-size:18px}
  .product-grid{grid-template-columns:1fr}
  .pc-img{width:64px;height:64px}
  .pc-best-price{font-size:18px}
  .content{padding:0 12px 40px}
  .modal{margin:0 8px}
  .modal-head{padding:16px}
  .modal-body{padding:12px 16px 16px}
  .filter-row{gap:4px}
  .chip{padding:5px 10px;font-size:11px}
  .sbtn{padding:4px 10px;font-size:10px}
  .page-btn{padding:6px 10px;font-size:11px}
  .pc-badge.firsat{font-size:12px;padding:6px 12px}
}
@media(max-width:480px){
  .header-inner{flex-wrap:wrap}
  .search-box{max-width:100%;order:3;flex-basis:100%}
  .hero h1{font-size:18px}
  .hero .stats{gap:16px}
  .hero .stat b{font-size:16px}
  .pc-top{gap:12px}
  .pc-info{gap:2px}
  .pc-name{font-size:12px}
  .pc-series{font-size:9px}
}
</style>
</head>

function initTheme(){
  const s=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',s);
  document.getElementById('themeBtn').innerHTML=s==='dark'?'&#x2600;':'&#x263E;';
}
function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('theme',n);
  document.getElementById('themeBtn').innerHTML=n==='dark'?'&#x2600;':'&#x263E;';
}

  if(typeof ALL_PRODUCTS!=='undefined'){ALL=ALL_PRODUCTS;}
  else{const r=await fetch('/api/data');ALL=await r.json();}
  ALL.forEach(p=>{
    p.prices.sort((a,b)=>a.price-b.price);
    p.min_price=p.prices[0]?.price||0;

function renderStats(){
  const sc={};
  ALL.forEach(p=>{sc[p.series]=(sc[p.series]||0)+1});
  document.getElementById('heroStats').innerHTML=`
    <div class="stat"><b>${ALL.length}</b><span>Urun</span></div>
    <div class="stat"><b>8</b><span>Site</span></div>
    <div class="stat"><b>${Object.keys(sc).length}</b><span>Seri</span></div>`;
}

function renderFilters(){
  const c={};
  ALL.forEach(p=>{c[p.series]=(c[p.series]||0)+1});
  document.getElementById('filterBar').innerHTML=`<span class="filter-label">Seri</span>`+
    `<div class="chip active" onclick="filterSeries(null,this)">Tumu <span class="cnt">${ALL.length}</span></div>`+
    Object.keys(SERIES_COLORS).filter(s=>c[s]).map(s=>
      `<div class="chip" onclick="filterSeries('${s}',this)">${s} <span class="cnt">${c[s]}</span></div>`
    ).join('');
}

function filterSeries(s,el){
  document.querySelectorAll('.filter-row .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filtered=s?ALL.filter(p=>p.series===s):[...ALL];
  curPage=1;applySort();
}

function setSort(sort,el){
  curSort=sort;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applySort();
}

function applySort(){
  switch(curSort){
    case 'price_asc':filtered.sort((a,b)=>a.min_price-b.min_price);break;
    case 'price_desc':filtered.sort((a,b)=>b.min_price-a.min_price);break;
    case 'sites':filtered.sort((a,b)=>b.prices.length-a.prices.length);break;
    case 'saving':filtered.sort((a,b)=>b.saving-a.saving);break;
  }
  renderProducts();
}

function renderProducts(){
  const grid=document.getElementById('productGrid');
  const start=(curPage-1)*PER;
  const items=filtered.slice(start,start+PER);
  const total=Math.ceil(filtered.length/PER);
  document.getElementById('resultInfo').innerHTML=`<b>${filtered.length}</b> urun (Sayfa ${curPage}/${total})`;

  if(!items.length){grid.innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--fg3);grid-column:1/-1">Urun bulunamadi.</div>';return;}

  grid.innerHTML=items.map((p,idx)=>{
    const isMulti=p.prices.length>1;
    const bestPrice=p.prices[0]?.price||0;
    const secondPrice=p.prices[1]?.price||bestPrice;
    const discountPct=secondPrice>0?Math.round((1-bestPrice/secondPrice)*100):0;
    const showFirsat=bestPrice>=700&&p.saving>0;

    return `<div class="product-card" onclick='openModal(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      ${showFirsat?`<div class="pc-badge firsat">Bu firsat kacmaz ortak</div>`:
        (discountPct>=10?`<div class="pc-badge hot">%${discountPct}</div>`:
          (isMulti?`<div class="pc-badge sites-badge">${p.prices.length} site</div>`:''))}
      <div class="pc-top">
        <img class="pc-img" src="${p.image}" alt="" loading="lazy" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{className:'pc-img-ph',innerHTML:'<span class=ph-brand>BIODERMA</span>'}))">
        <div class="pc-info">
          <div class="pc-series">${p.series} ${p.size||''}</div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-best-price">${bestPrice.toLocaleString('tr-TR')} <span class="tl">TL</span></div>
          <div class="pc-meta">${p.prices.length} sitede${p.saving>0?' &middot; <b>'+p.saving.toLocaleString('tr-TR')+' TL fark</b>':''}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  renderPag(total);
}

function renderPag(total){
  const p=document.getElementById('pagination');
  if(total<=1){p.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>&larr;</button>`;
  for(let i=1;i<=total;i++){
    if(i===1||i===total||(i>=curPage-2&&i<=curPage+2)){
      h+=`<button class="page-btn ${i===curPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }else if(i===curPage-3||i===curPage+3){h+=`<button class="page-btn" disabled>...</button>`;}
  }
  h+=`<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===total?'disabled':''}>&rarr;</button>`;
  p.innerHTML=h;
}

function goPage(n){const t=Math.ceil(filtered.length/PER);if(n<1||n>t)return;curPage=n;renderProducts();window.scrollTo({top:200,behavior:'smooth'});}
function doSearch(){const q=document.getElementById('searchInput').value.trim().toLowerCase();filtered=q?ALL.filter(p=>p.name.toLowerCase().includes(q)||p.series.toLowerCase().includes(q)):[...ALL];curPage=1;applySort();}
function resetAll(){document.getElementById('searchInput').value='';filtered=[...ALL];curPage=1;document.querySelectorAll('.filter-row .chip').forEach(c=>c.classList.remove('active'));document.querySelector('.filter-row .chip').classList.add('active');applySort();window.scrollTo({top:0,behavior:'smooth'});}

function openModal(p){
  const color=SERIES_COLORS[p.series]||'#9ca3af';
  const bestPrice=p.prices[0]?.price||0;
  const sitesHtml=p.prices.map((pr,i)=>{
    const isBest=i===0;
    const icon=SITE_ICONS[pr.site]||pr.site.substring(0,2).toUpperCase();
    return `<div class="modal-site-row ${isBest?'best':''}">
      <span class="modal-site-name"><span class="site-icon">${icon}</span>${pr.site}</span>
      <span class="modal-site-price">${pr.price.toLocaleString('tr-TR')} TL</span>
      <a href="${pr.url}" target="_blank" rel="noopener" class="modal-site-btn ${isBest?'best-btn':''}">${isBest?'En Ucuz':'Git'}</a>
    </div>`;
  }).join('');

  document.getElementById('modal').innerHTML=`
    <div class="modal-head">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <img class="modal-img" src="${p.image}" alt="" onerror="this.onerror=null;this.replaceWith(Object.assign(document.createElement('div'),{className:'pc-img-ph',innerHTML:'<span class=ph-brand>BIODERMA</span>'}))">
      <div class="modal-info">
        <div class="modal-series">${p.series} ${p.size||''}</div>
        <div class="modal-name">${p.name}</div>
        <div class="modal-price">${bestPrice.toLocaleString('tr-TR')} <span class="tl">TL</span></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-body-title">${p.prices.length} Sitedeki Fiyat</div>
      ${sitesHtml}
      ${p.saving>0?`<div class="modal-saving">En ucuz ile en pahali arasinda <b>${p.saving.toLocaleString('tr-TR')} TL</b> fark</div>`:''}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.body.style.position='fixed';
  document.body.style.width='100%';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
  document.body.style.position='';
  document.body.style.width='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
init();
</script>
</body>
</html>
